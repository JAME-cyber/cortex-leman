# Cortex Leman v5 — Docker Compose Production (Accès Réseau)
# ═══════════════════════════════════════════════════════════════
# Usage: docker compose -f docker-compose.prod.yml up -d
#
# Accessible depuis TOUTES les machines du réseau local:
#   http://<IP_DE_CETTE_MACHINE>:8090
# ═══════════════════════════════════════════════════════════════

version: "3.8"

services:
  # ═══ Bus événementiel ═══
  nats:
    image: nats:2.10-alpine
    restart: unless-stopped
    ports:
      - "4222:4222"
      - "8222:8222"
    command:
      - "--jetstream"
      - "--store_dir=/data"
      - "-m"
      - "8222"
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ═══ Cache + Verrous distribués ═══
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ═══ Base de données ═══
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: cortex_leman
      POSTGRES_USER: cortex
      POSTGRES_PASSWORD: cortex_prod_2026
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cortex -d cortex_leman"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ═══ API Backend v5 (5 agents + médiateur + orchestrateur) ═══
  api:
    image: cortex-leman-v5:latest
    build:
      context: .
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - NATS_URL=nats://nats:4222
      - REDIS_HOST=redis
      - DATABASE_URL=postgresql://cortex:cortex_prod_2026@postgres:5432/cortex_leman
      - APP_ENV=production
      - API_HOST=0.0.0.0
      - API_PORT=8000
    depends_on:
      nats:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - journal-data:/app/data/journal
      - reports-data:/app/data/reports
      - vault-data:/app/data/vault
      - chroma-data:/app/data/chroma_db
      - intentions-data:/app/data/intentions
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ═══ Frontend + Reverse Proxy (accessible réseau) ═══
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${PILOT_PORT:-8090}:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx/pilot.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  nats-data:
  redis-data:
  postgres-data:
  journal-data:
  reports-data:
  vault-data:
  chroma-data:
  intentions-data:
