# Cortex Leman v5 — Docker Compose Production (Pilote)
# Usage: docker compose -f docker-compose.prod.yml up -d
#
# Contenu:
#   - NATS (bus événementiel)
#   - Redis (cache + verrous)
#   - API FastAPI (backend)
#   - Frontend (servi par Nginx)
#   - ChromaDB (RAG vectoriel)
#   - Watchtower (mises à jour auto)

version: "3.8"

services:
  # ═══ Infrastructure ═══
  nats:
    image: nats:2.10-alpine
    restart: unless-stopped
    command:
      - "--jetstream"
      - "--store_dir=/data"
      - "-m"
      - "8222"
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8222/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ═══ API Backend ═══
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      - NATS_URL=nats://nats:4222
      - REDIS_HOST=redis
      - APP_ENV=production
      - DATABASE_URL=sqlite:///./data/cortex-leman.db
    depends_on:
      nats:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - journal-data:/app/data/journal
      - reports-data:/app/data/reports
      - vault-data:/app/data/vault
      - chroma-data:/app/data/chroma_db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ═══ Frontend + Reverse Proxy ═══
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${PILOT_PORT:-8090}:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx/pilot.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  nats-data:
  redis-data:
  journal-data:
  reports-data:
  vault-data:
  chroma-data:
